name: Deploy MVP

on:
  push:
    branches:
      - main
      - dev
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})
          STACK_NAME="stock-notifier-mvp-${BRANCH_NAME}"
          if [ "$BRANCH_NAME" = "main" ]; then
            SIGNING_SECRET="${{ secrets.SLACK_SIGNING_SECRET }}"
            SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}"
            NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}"
          else
            SIGNING_SECRET="${{ secrets.SLACK_SIGNING_SECRET_DEV }}"
            SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL_DEV }}"
            NEWS_API_KEY="${{ secrets.NEWS_API_KEY_DEV }}"
          fi
          set +e
          sam deploy --no-confirm-changeset \
                     --no-fail-on-empty-changeset \
                     --stack-name ${STACK_NAME} \
                     --capabilities CAPABILITY_IAM \
                     --resolve-s3 \
                     --parameter-overrides \
                     "SlackSigningSecret=${SIGNING_SECRET}" \
                     "SlackWebhookUrl=${SLACK_WEBHOOK_URL}" \
                     "NewsApiKey=${NEWS_API_KEY}"
          DEPLOY_EXIT_CODE=$?
          set -e

          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            echo "SAM deploy failed. Showing recent CloudFormation stack events for ${STACK_NAME}."
            aws cloudformation describe-stack-events \
              --stack-name ${STACK_NAME} \
              --max-items 30 \
              --query 'StackEvents[].[Timestamp,ResourceStatus,LogicalResourceId,ResourceType,ResourceStatusReason]' \
              --output table || true
            exit $DEPLOY_EXIT_CODE
          fi
