AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: MVP Serverless app for Slack Command and EventBridge Scheduler

Parameters:
  SlackSigningSecret:
    Type: String
    NoEcho: true
    Description: "Slack Signing Secret"
  SlackWebhookUrl:
    Type: String
    NoEcho: true
    Description: "Slack Incoming Webhook URL"
    Default: ""
  NewsApiKey:
    Type: String
    NoEcho: true
    Description: "NewsAPI Key"
    Default: ""
  NewsApiUrl:
    Type: String
    Description: "NewsAPI Endpoint URL"
    Default: "https://newsapi.org/v2/everything"
  HttpTimeoutSeconds:
    Type: Number
    Description: "HTTP timeout for news fetch operations"
    Default: 5
  MaxNewsPerStock:
    Type: Number
    Description: "Maximum number of news entries per stock in Slack message"
    Default: 5
  MaxMarketNews:
    Type: Number
    Description: "Maximum number of market overview news entries in Slack message"
    Default: 8
  JQuantsApiKey:
    Type: String
    NoEcho: true
    Description: "J-Quants API key"
    Default: ""
  JQuantsBaseUrl:
    Type: String
    Description: "J-Quants API base URL"
    Default: "https://api.jquants.com"

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Architectures:
      - x86_64

Resources:
  StockSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: StockID
          AttributeType: S
        - AttributeName: Timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: StockID
          KeyType: HASH
        - AttributeName: Timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  StockMasterTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: StockCode
          AttributeType: S
        - AttributeName: SnapshotAt
          AttributeType: S
      KeySchema:
        - AttributeName: StockCode
          KeyType: HASH
        - AttributeName: SnapshotAt
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  StockAppFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref StockSubscriptionsTable
          MASTER_TABLE_NAME: !Ref StockMasterTable
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          NEWS_API_KEY: !Ref NewsApiKey
          NEWS_API_URL: !Ref NewsApiUrl
          HTTP_TIMEOUT_SECONDS: !Ref HttpTimeoutSeconds
          MAX_NEWS_PER_STOCK: !Ref MaxNewsPerStock
          MAX_MARKET_NEWS: !Ref MaxMarketNews
          JQUANTS_API_KEY: !Ref JQuantsApiKey
          JQUANTS_BASE_URL: !Ref JQuantsBaseUrl
      FunctionUrlConfig:
        AuthType: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StockSubscriptionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref StockMasterTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: "*"
      Events:
        DailyScheduler:
          Type: Schedule
          Properties:
            Schedule: "rate(1 day)"
            Input: '{"source": "scheduler", "detail-type": "Daily Execution"}'

Outputs:
  FunctionUrlEndpoint:
    Description: "Function URL Endpoint for Slack"
    Value: !GetAtt StockAppFunctionUrl.FunctionUrl
